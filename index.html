<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Кандидаты</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:15px;color:#111;background:#eef2f7}
.app{padding:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;background:#fff;padding:12px 16px;border-radius:10px;border:1px solid #e0e0e0}
.topbar h1{font-size:19px;font-weight:700;color:#1F3864}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{font-size:13px;padding:5px 9px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#222;height:32px}
.btn{padding:5px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#222;cursor:pointer;font-size:13px;height:32px}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#1F3864;color:#fff;border-color:#1F3864}
.btn-primary:hover{background:#162a4a}
.btn-sm{padding:3px 8px;font-size:11px;height:24px}
.btn-sync{background:#e8f5e9;border-color:#4caf50;color:#2e7d32;font-weight:600}
.btn-load{background:#e3f2fd;border-color:#1976d2;color:#1565c0;font-weight:600}
.btn-report{background:#f3e5f5;border-color:#9c27b0;color:#6a1b9a;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #e0e0e0;cursor:pointer}
.stat:hover{border-color:#1F3864}
.stat-n{font-size:26px;font-weight:700;color:#1F3864}
.stat-l{font-size:12px;color:#555;margin-top:3px;font-weight:600}
.tabs{display:flex;border-bottom:2px solid #e0e0e0;margin-bottom:14px;background:#fff;border-radius:8px 8px 0 0;padding:0 8px}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;border-bottom:3px solid transparent;color:#888;margin-bottom:-2px}
.tab.active{color:#1F3864;border-bottom-color:#1F3864;font-weight:600}
.tbl-wrap{overflow-x:auto;border:1px solid #c8d4e8;border-radius:8px;background:#fff;box-shadow:0 2px 8px rgba(31,56,100,0.08)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:#1F3864;color:#fff;font-weight:700;border-bottom:2px solid #162a4a;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#2a4a7f}
td{padding:9px 12px;border-bottom:1px solid #e8ecf0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#e8f0fc}
.row-overdue td{background:#fff5f5!important}
.row-today td{background:#fffbf0!important}
.row-done td{opacity:0.6}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;white-space:nowrap}
.bw{background:#EAF3DE;color:#3B6D11}
.bo{background:#E6F1FB;color:#185FA5}
.bout{background:#E8F5E9;color:#1B5E20}
.br{background:#FCEBEB;color:#A32D2D}
.brs{background:#FBEAF0;color:#993556}
.bnv{background:#FFF3E0;color:#E65100}
.brop{background:#EDE7F6;color:#4527A0}
.bpurple{background:#E8E0F5;color:#5E35B1}
.bdef{background:#f0f0f0;color:#666}
.vac-daler{background:#E3F2FD;color:#0D47A1;font-weight:600;border-radius:12px;padding:3px 10px;display:inline-block}
.vac-smetchik{background:#E8F5E9;color:#1B5E20;font-weight:600;border-radius:12px;padding:3px 10px;display:inline-block}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.dr{background:#E24B4A}.dy{background:#EF9F27}.dg{background:#639922}
.empty{text-align:center;padding:32px;color:#aaa}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:12px;border:1px solid #ddd;padding:20px;width:600px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal-wide{width:800px}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px;color:#1F3864}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;color:#888;margin-bottom:4px;font-weight:600;text-transform:uppercase}
.fr input,.fr select,.fr textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;color:#222}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:#1F3864}
.fr textarea{height:70px;resize:vertical;font-family:Arial,sans-serif}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid #eee}
.hist-item{padding:10px 14px;border-bottom:1px solid #f0f0f0;display:grid;grid-template-columns:90px 150px 1fr 60px;gap:10px;font-size:13px}
.hist-item:last-child{border-bottom:none}
.upload-area{border:2px dashed #ccc;border-radius:8px;padding:14px;text-align:center;color:#888;font-size:13px;cursor:pointer;margin-bottom:12px}
.upload-area:hover{background:#f5f5f5;border-color:#1F3864}
.section-title{font-size:13px;font-weight:600;color:#1F3864;margin:12px 0 8px;padding-bottom:6px;border-bottom:1px solid #eee}
.sync-status{font-size:12px;padding:4px 10px;border-radius:6px;font-weight:600}
.sync-ok{background:#e8f5e9;color:#2e7d32}
.sync-err{background:#ffebee;color:#c62828}
.sync-loading{background:#fff8e1;color:#f57f17}
/* Отчёт */
.report-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.report-card{background:#f8f9ff;border:1px solid #c8d4e8;border-radius:8px;padding:14px;text-align:center}
.report-card-n{font-size:32px;font-weight:700;color:#1F3864}
.report-card-l{font-size:12px;color:#555;margin-top:4px;font-weight:600}
.report-card.green{background:#e8f5e9;border-color:#a5d6a7}
.report-card.green .report-card-n{color:#2e7d32}
.report-card.red{background:#ffebee;border-color:#ef9a9a}
.report-card.red .report-card-n{color:#c62828}
.report-card.blue{background:#e3f2fd;border-color:#90caf9}
.report-card.blue .report-card-n{color:#1565c0}
.report-card.orange{background:#fff3e0;border-color:#ffcc80}
.report-card.orange .report-card-n{color:#e65100}
.report-detail{background:#f8f9ff;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;margin-bottom:12px}
.report-detail table{font-size:12px}
.report-detail th{background:#e8ecf5;color:#1F3864;padding:7px 10px}
.report-detail td{padding:6px 10px}
.multiselect-dd{display:none;position:absolute;top:34px;left:0;background:#fff;border:1px solid #ccc;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:100;min-width:230px;padding:8px 0}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>🗂 CRM — Кандидаты</h1>
  <div class="filters">
    <input type="text" id="srch" placeholder="🔍 Поиск..." style="width:140px">
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;padding:0 10px;height:32px;border:1px solid #1976d2;border-radius:6px;background:#e3f2fd;color:#1565c0;font-weight:600;white-space:nowrap">
      <input type="checkbox" id="activeOnly" checked onchange="renderTable()" style="width:14px;height:14px;accent-color:#1565c0"> Только активные
    </label>
    <input type="date" id="fDate" onchange="renderTable()" style="height:32px;font-size:13px;border:1px solid #ccc;border-radius:6px;padding:0 8px;background:#fff">
    <button class="btn" onclick="setToday()" style="background:#fff8e1;border-color:#f9a825;color:#f57f17;font-weight:600;white-space:nowrap">📅 Сегодня</button>
    <button class="btn" onclick="clearDate()" style="font-size:12px">✕ Дата</button>
    <select id="fV"><option value="">Все вакансии</option><option>Менеджер по продажам</option><option>РОП (Далер)</option><option>инженер-сметчик</option><option>РОП</option><option>Project Manager</option></select>
    <div style="position:relative;display:inline-block">
      <button class="btn" onclick="toggleDD('stageDD')" id="stageBtnLabel" style="min-width:120px;text-align:left">Все этапы ▾</button>
      <div id="stageDD" class="multiselect-dd">
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Интервью HR" onchange="applyStageFilter()"> Интервью HR</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Интервью с руководителем" onchange="applyStageFilter()"> Интервью с руководителем</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Отклик" onchange="applyStageFilter()"> Отклик</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Финал" onchange="applyStageFilter()"> Финал</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Оффер" onchange="applyStageFilter()"> Оффер</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Обучение" onchange="applyStageFilter()"> Обучение</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Выход" onchange="applyStageFilter()"> Выход</label>
        <div style="border-top:1px solid #eee;margin:4px 0;padding:4px 14px"><button class="btn btn-sm" onclick="clearStageFilter()">Сбросить</button></div>
      </div>
    </div>
    <div style="position:relative;display:inline-block">
      <button class="btn" onclick="toggleDD('statusDD')" id="statusBtnLabel" style="min-width:120px;text-align:left">Все статусы ▾</button>
      <div id="statusDD" class="multiselect-dd">
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="В работе" onchange="applyStatusFilter()"> В работе</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Перенос собеседования" onchange="applyStatusFilter()"> Перенос собеседования</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Отказался сам (кандидат)" onchange="applyStatusFilter()"> Отказался сам (кандидат)</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Отказ" onchange="applyStatusFilter()"> Отказ</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Оффер" onchange="applyStatusFilter()"> Оффер</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Вышел" onchange="applyStatusFilter()"> Вышел</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Не вышел на собеседование" onchange="applyStatusFilter()"> Не вышел на собеседование</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Собеседование с РОП" onchange="applyStatusFilter()"> Собеседование с РОП</label>
        <div style="border-top:1px solid #eee;margin:4px 0;padding:4px 14px"><button class="btn btn-sm" onclick="clearStatusFilter()">Сбросить</button></div>
      </div>
    </div>
    <button class="btn btn-report" onclick="openReport()">📊 Отчёт</button>
    <button class="btn btn-sync" onclick="syncToSheets()">☁️ Сохранить</button>
    <button class="btn btn-load" onclick="loadFromSheets()">🔄 Загрузить</button>
    <label class="btn" style="cursor:pointer;background:#fff3e0;border-color:#ff9800;color:#e65100;font-weight:600">📂 Импорт<input type="file" accept=".json" onchange="importJSON(event)" style="display:none"></label>
    <button class="btn btn-primary" onclick="openAdd()">+ Добавить</button>
    <span id="syncStatus" class="sync-status" style="display:none"></span>
  </div>
</div>
<div class="stats" id="stats"></div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('c',this)">Кандидаты</div>
  <div class="tab" onclick="switchTab('h',this)">История событий</div>
</div>
<div id="tc">
  <div class="tbl-wrap">
    <table><thead><tr id="thead-row"></tr></thead><tbody id="tb"></tbody></table>
  </div>
</div>
<div id="th" style="display:none">
  <div class="tbl-wrap"><div id="hb"></div></div>
</div>
</div>
<div id="mdl" style="display:none"></div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbz4bRHeOTKV9Be1sSiF2EYa1Q_n8h6kqIdGRLMYkYZwJ3-z6kraaB0L6rCvwPWaqD7S/exec';

function setSyncStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.style.display = 'inline-block';
  el.className = 'sync-status sync-' + type;
  el.textContent = msg;
  if (type === 'ok') setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function syncToSheets() {
  setSyncStatus('⏳ Сохраняю...', 'loading');
  fetch(SHEETS_URL, { method: 'POST', body: JSON.stringify({ candidates: D.candidates, history: D.history }) })
    .then(r => r.json())
    .then(res => {
      if (res && res.ok) setSyncStatus('✅ Сохранено!', 'ok');
      else setSyncStatus('❌ Ошибка', 'err');
    })
    .catch(() => setSyncStatus('❌ Нет соединения', 'err'));
}

function loadFromSheets() {
  setSyncStatus('⏳ Загружаю...', 'loading');
  const script = document.createElement('script');
  const cbName = 'cb_read_' + Date.now();
  window[cbName] = function(res) {
    delete window[cbName];
    document.head.removeChild(script);
    if (res && res.ok && res.data) {
      if (res.data.candidates) D.candidates = res.data.candidates;
      if (res.data.history) D.history = res.data.history;
      saveLocal(); render();
      setSyncStatus('✅ Загружено!', 'ok');
    } else setSyncStatus('❌ Ошибка загрузки', 'err');
  };
  script.src = SHEETS_URL + '?action=read&callback=' + cbName;
  script.onerror = () => { delete window[cbName]; setSyncStatus('❌ Нет соединения', 'err'); };
  document.head.appendChild(script);
}

// Нормализация старых статусов при загрузке
function normalizeStatus(s) {
  if (!s) return s;
  if (s === 'Отказался сам' || s === 'Отказалась сама') return 'Отказался сам (кандидат)';
  if (s === 'Не вышла на собес') return 'Не вышел на собеседование';
  return s;
}

const STAGES = ['Отклик', 'Интервью HR', 'Интервью с руководителем', 'Финал', 'Оффер', 'Обучение', 'Выход'];
const STATUSES = ['В работе', 'Перенос собеседования', 'Отказался сам (кандидат)', 'Отказ', 'Оффер', 'Вышел', 'Не вышел на собеседование', 'Собеседование с РОП'];
const VACANCIES = ['Менеджер по продажам', 'РОП (Далер)', 'инженер-сметчик', 'РОП', 'Project Manager'];
const EVENTS = ['Добавлен кандидат', 'Интервью HR', 'Интервью с руководителем', 'Тестовое задание', 'Оффер отправлен', 'Оффер принят', 'Отказался сам (кандидат)', 'Отказ компании', 'Выход на работу'];
const REFUSE_REASONS = ['', 'Слабая', 'Не пришла на интервью', 'Не подходит доход', 'Приняла другой оффер', 'Нерелевантный опыт', 'Другое'];
const INACTIVE = ['Отказ', 'Отказался сам (кандидат)', 'Вышел', 'Не вышел на собеседование'];
const REFUSE_STATUSES = ['Отказ', 'Отказался сам (кандидат)', 'Не вышел на собеседование'];

let D = { candidates: [], history: [] };

function loadLocal() {
  try { const s = localStorage.getItem('crm_candidates'); if (s) { const p = JSON.parse(s); if (Array.isArray(p)) D.candidates = p.map(c => ({ ...c, status: normalizeStatus(c.status) })); } } catch(e) { D.candidates = []; }
  try { const s = localStorage.getItem('crm_history'); if (s) { const p = JSON.parse(s); if (Array.isArray(p)) D.history = p; } } catch(e) { D.history = []; }
}

function saveLocal() {
  localStorage.setItem('crm_candidates', JSON.stringify(D.candidates));
  localStorage.setItem('crm_history', JSON.stringify(D.history));
}

function saveData() { saveLocal(); syncToSheets(); }

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function parseDate(s) {
  if (!s) return null;
  const p = s.split('-');
  if (p.length !== 3) return null;
  return new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]));
}

function isSameDay(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return false;
  const t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}

function nextId() {
  if (!D.candidates.length) return 'K-001';
  const nums = D.candidates.map(c => parseInt(c.id.replace(/\D/g,''))||0);
  return 'K-' + String(Math.max(...nums)+1).padStart(3,'0');
}

function sel(opts, val) {
  return opts.map(o => `<option${o===val?' selected':''}>${o}</option>`).join('');
}

function toggleRefuse(s, divId) {
  const d = document.getElementById(divId);
  if (d) d.style.display = ['Отказ','Отказался сам (кандидат)'].includes(s.value) ? 'block' : 'none';
}

function sbadge(s) {
  const m = {
    'В работе':'bw','Перенос собеседования':'bpurple','Оффер':'bo','Вышел':'bout',
    'Отказ':'br','Отказался сам (кандидат)':'brs','Не вышел на собеседование':'bnv','Собеседование с РОП':'brop'
  };
  return `<span class="badge ${m[s]||'bdef'}">${s}</span>`;
}

function vacancyColorClass(v) {
  if (v==='РОП (Далер)') return 'vac-daler';
  if (v==='инженер-сметчик') return 'vac-smetchik';
  return '';
}

function dlabel(ds) {
  const d = parseDate(ds);
  if (!d) return '';
  const today = new Date(); today.setHours(0,0,0,0); d.setHours(0,0,0,0);
  const diff = Math.round((d-today)/86400000);
  const cls = diff<0?'dr':diff===0?'dy':'dg';
  return `<span class="dot ${cls}"></span>${d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'})}`;
}

function rclass(c) {
  if (INACTIVE.includes(c.status)) return 'row-done';
  if (!c.nextDate) return '';
  const d = parseDate(c.nextDate);
  if (!d) return '';
  const today = new Date(); today.setHours(0,0,0,0); d.setHours(0,0,0,0);
  const diff = Math.round((d-today)/86400000);
  return diff<0?'row-overdue':diff===0?'row-today':'';
}

let sortCol='id', sortDir=1;
function sortBy(col) { sortCol===col ? sortDir*=-1 : (sortCol=col, sortDir=1); renderTable(); }
function arrow(col) { return sortCol===col?(sortDir===1?' ↑':' ↓'):''; }
function getChecked(ddId) { return [...document.querySelectorAll(`#${ddId} input[type=checkbox]:checked`)].map(x=>x.value); }

function applyStageFilter() {
  const checked = getChecked('stageDD');
  document.getElementById('stageBtnLabel').textContent = checked.length ? checked.join(', ')+' ▾' : 'Все этапы ▾';
  renderTable();
}

function applyStatusFilter() {
  const checked = getChecked('statusDD');
  document.getElementById('statusBtnLabel').textContent = checked.length ? checked.join(', ')+' ▾' : 'Все статусы ▾';
  renderTable();
}

function clearStageFilter() {
  document.querySelectorAll('#stageDD input').forEach(x=>x.checked=false);
  document.getElementById('stageBtnLabel').textContent = 'Все этапы ▾';
  document.getElementById('stageDD').style.display='none';
  renderTable();
}

function clearStatusFilter() {
  document.querySelectorAll('#statusDD input').forEach(x=>x.checked=false);
  document.getElementById('statusBtnLabel').textContent = 'Все статусы ▾';
  document.getElementById('statusDD').style.display='none';
  renderTable();
}

function toggleDD(id) {
  const dd = document.getElementById(id);
  ['stageDD','statusDD'].filter(x=>x!==id).forEach(x=>{ document.getElementById(x).style.display='none'; });
  dd.style.display = dd.style.display==='none'?'block':'none';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#stageDD') && !e.target.closest('[onclick*="stageDD"]')) document.getElementById('stageDD').style.display='none';
  if (!e.target.closest('#statusDD') && !e.target.closest('[onclick*="statusDD"]')) document.getElementById('statusDD').style.display='none';
});

function setToday() { document.getElementById('fDate').value=todayStr(); renderTable(); }
function clearDate() { document.getElementById('fDate').value=''; renderTable(); }

function renderStats() {
  const active = D.candidates.filter(x=>x.status==='В работе').length;
  const offers = D.candidates.filter(x=>x.status==='В работе'&&x.stage==='Оффер').length;
  const tod = D.candidates.filter(x=>!INACTIVE.includes(x.status)&&isSameDay(x.nextDate)).length;
  const ref = D.candidates.filter(x=>REFUSE_STATUSES.includes(x.status)).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${active}</div><div class="stat-l">В работе</div></div>
    <div class="stat"><div class="stat-n">${offers}</div><div class="stat-l">На стадии оффера</div></div>
    <div class="stat" onclick="setToday()"><div class="stat-n">${tod}</div><div class="stat-l">Встреч сегодня 👆</div></div>
    <div class="stat"><div class="stat-n">${ref}</div><div class="stat-l">Отказов</div></div>`;
}

function renderTable() {
  const tb=document.getElementById('tb');
  renderHeaders();
  const q=(document.getElementById('srch').value||'').toLowerCase();
  const fv=document.getElementById('fV').value;
  const stages=getChecked('stageDD');
  const statuses=getChecked('statusDD');
  const activeOnly=document.getElementById('activeOnly').checked;
  const fDate=document.getElementById('fDate').value;

  let rows=D.candidates.filter(c=>{
    if(q && !c.name.toLowerCase().includes(q)) return false;
    if(fv && c.vacancy!==fv) return false;
    if(stages.length && !stages.includes(c.stage)) return false;
    if(statuses.length && !statuses.includes(c.status)) return false;
    if(activeOnly && !statuses.length && INACTIVE.includes(c.status)) return false;
    if(fDate && c.nextDate!==fDate) return false;
    return true;
  });

  rows.sort((a,b)=>{
    if(sortCol==='id') return sortDir*(parseInt(a.id.replace(/\D/g,''))-parseInt(b.id.replace(/\D/g,'')));
    if(sortCol==='date'){
      const ad=a.nextDate||'9999', bd=b.nextDate||'9999';
      if(ad!==bd) return sortDir*ad.localeCompare(bd);
      return sortDir*(a.meetTime||'').localeCompare(b.meetTime||'');
    }
    const av=(sortCol==='name'?a.name:sortCol==='stage'?a.stage:sortCol==='status'?a.status:sortCol==='vacancy'?a.vacancy:'')||'';
    const bv=(sortCol==='name'?b.name:sortCol==='stage'?b.stage:sortCol==='status'?b.status:sortCol==='vacancy'?b.vacancy:'')||'';
    return sortDir*av.localeCompare(bv,'ru');
  });

  if(!rows.length){tb.innerHTML=`<tr><td colspan="14" class="empty">Нет кандидатов</td></tr>`;return;}
  tb.innerHTML=rows.map(c=>{
    let phone='';
    if(c.contacts){for(let p of c.contacts.split(' / ')){if(p.match(/[\d\+]/)){phone=p;break;}}}
    const resume=c.resumeLink?`<a href="${c.resumeLink}" target="_blank" style="color:#185FA5">Открыть</a>`:'—';
    const hhOrPdf=c.hhLink?`<a href="${c.hhLink}" target="_blank" style="color:#d6001c">HH ↗</a>`:(c.pdfName?`📄 ${c.pdfName.length>15?c.pdfName.slice(0,13)+'…':c.pdfName}`:'—');
    const refReason=REFUSE_STATUSES.includes(c.status)&&c.refuseReason?`<span class="badge br">${c.refuseReason}</span>`:'';
    const vacClass=vacancyColorClass(c.vacancy);
    const vacancyHtml=vacClass?`<span class="${vacClass}">${c.vacancy}</span>`:c.vacancy;
    return `<tr class="${rclass(c)}">
      <td>${c.id}</td><td><b>${c.name}</b></td><td>${vacancyHtml}</td><td>${c.stage}</td>
      <td>${sbadge(c.status)}</td><td>${c.next||'—'}</td><td>${dlabel(c.nextDate)}</td>
      <td>${c.meetTime||''}</td><td>${phone||'—'}</td><td>${refReason}</td>
      <td style="max-width:200px;white-space:normal">${c.comment||''}</td>
      <td>${resume}</td><td>${hhOrPdf}</td>
      <td><button class="btn btn-sm" onclick="openEdit('${c.id}')">✏️</button></td>
    </tr>`;
  }).join('');
}

function renderHistory() {
  const hb=document.getElementById('hb');
  const items=[...D.history].reverse();
  if(!items.length){hb.innerHTML=`<div class="empty">История пуста</div>`;return;}
  hb.innerHTML=items.map(h=>`<div class="hist-item">
    <div>${h.date?new Date(h.date+'T12:00:00').toLocaleDateString('ru-RU'):''}</div>
    <div><b>${h.name||''}</b><br><small>${h.cid||''}</small></div>
    <div><b>${h.event||''}</b><br>${h.desc||''}${h.result?`<br><small>${h.result}</small>`:''}</div>
    <div>${h.resp||''}</div>
  </div>`).join('');
}

function buildReport() {
  const from = document.getElementById('rFrom').value;
  const to = document.getElementById('rTo').value;
  const vac = document.getElementById('rVac').value;
  const selStages = [...document.querySelectorAll('[name=rStage]:checked')].map(x=>x.value);
  const selStatuses = [...document.querySelectorAll('[name=rStatus]:checked')].map(x=>x.value);

  // Если выбрано "Все отказы вместе" — подставляем все статусы отказов
  let effectiveStatuses = selStatuses;
  if (selStatuses.includes('__all_refuse__')) {
    effectiveStatuses = [...new Set([...selStatuses.filter(x=>x!=='__all_refuse__'), ...REFUSE_STATUSES])];
  }

  let pool = D.candidates;

  // Фильтр по дате добавления
  if (from) pool = pool.filter(c => c.added && c.added >= from);
  if (to)   pool = pool.filter(c => c.added && c.added <= to);
  if (vac)  pool = pool.filter(c => c.vacancy === vac);
  if (selStages.length) pool = pool.filter(c => selStages.includes(c.stage));
  if (effectiveStatuses.length) pool = pool.filter(c => effectiveStatuses.includes(c.status));

  const total = pool.length;
  const refused = pool.filter(c=>REFUSE_STATUSES.includes(c.status)).length;
  const selfRefuse = pool.filter(c=>c.status==='Отказался сам (кандидат)').length;
  const noShow = pool.filter(c=>c.status==='Не вышел на собеседование').length;
  const compRefuse = pool.filter(c=>c.status==='Отказ').length;
  const training = pool.filter(c=>c.stage==='Обучение'||c.stage==='Выход').length;
  const offer = pool.filter(c=>c.stage==='Оффер'||c.status==='Оффер').length;
  const inWork = pool.filter(c=>c.status==='В работе').length;

  const period = (from?`с ${from.split('-').reverse().join('.')} `:'') + (to?`по ${to.split('-').reverse().join('.')}`:'');

  // Детальная таблица
  const rows = pool.map(c=>`<tr>
    <td>${c.id}</td><td>${c.name}</td><td>${c.vacancy}</td>
    <td>${c.stage}</td><td>${c.status}</td>
    <td>${c.added||''}</td>
  </tr>`).join('');

  document.getElementById('reportResult').innerHTML = `
    <div class="section-title">Результат ${period ? '— '+period : ''} ${vac?'| '+vac:''}</div>
    <div class="report-grid">
      <div class="report-card blue"><div class="report-card-n">${total}</div><div class="report-card-l">Всего кандидатов</div></div>
      <div class="report-card"><div class="report-card-n">${inWork}</div><div class="report-card-l">В работе</div></div>
      <div class="report-card orange"><div class="report-card-n">${offer}</div><div class="report-card-l">Оффер</div></div>
      <div class="report-card green"><div class="report-card-n">${training}</div><div class="report-card-l">Вышли на обучение</div></div>
      <div class="report-card red"><div class="report-card-n">${refused}</div><div class="report-card-l">Всего отказов</div></div>
      <div class="report-card red"><div class="report-card-n">${selfRefuse}</div><div class="report-card-l">Отказался сам</div></div>
      <div class="report-card red"><div class="report-card-n">${noShow}</div><div class="report-card-l">Не вышел на собес</div></div>
      <div class="report-card red"><div class="report-card-n">${compRefuse}</div><div class="report-card-l">Отказ компании</div></div>
    </div>
    ${total>0?`<div class="report-detail">
      <table style="width:100%">
        <thead><tr>
          <th>ID</th><th>ФИО</th><th>Вакансия</th><th>Этап</th><th>Статус</th><th>Дата добавления</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`:'<div class="empty">Нет кандидатов по выбранным фильтрам</div>'}
  `;
}

// ========== PDF ==========
let pendingPdfName='';
function loadPDFJS() {
  return new Promise((resolve,reject)=>{
    if(typeof pdfjsLib!=='undefined'){resolve();return;}
    const script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
    script.onload=()=>{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';resolve();};
    script.onerror=reject; document.head.appendChild(script);
  });
}
function extractFromPDFText(text) {
  const result={name:'',phone:''};
  const nm=text.substring(0,500).match(/([А-Я][а-я]+)\s+([А-Я][а-я]+)\s+([А-Я][а-я]+)/);
  if(nm) result.name=nm[0];
  const pm=/(?:\+7|8|7)[\s\-\(\)]*(\d{3})[\s\-\(\)]*(\d{3})[\s\-\(\)]*(\d{2})[\s\-\(\)]*(\d{2})/;
  const m=text.match(pm);
  if(m) result.phone='+7'+m[1]+m[2]+m[3]+m[4];
  else{const sd=text.match(/\d{10}/);if(sd) result.phone='+7'+sd[0];}
  return result;
}
async function parsePDF(e) {
  const file=e.target.files[0]; if(!file) return;
  pendingPdfName=file.name;
  const area=document.querySelector('.upload-area');
  if(area) area.innerHTML='⏳ Читаю резюме...';
  try {
    await loadPDFJS();
    const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();text+=tc.items.map(x=>x.str).join(' ')+' ';}
    const ex=extractFromPDFText(text);
    if(ex.name){const fn=document.getElementById('fn');if(fn)fn.value=ex.name;}
    if(ex.phone){const fp=document.getElementById('fphone');if(fp)fp.value=ex.phone;}
    if(area){
      if(ex.phone){area.innerHTML='✅ Телефон загружен!';area.style.borderColor='#639922';area.style.background='#EAF3DE';area.style.color='#3B6D11';}
      else{area.innerHTML='⚠️ Телефон не найден. Заполните вручную.';area.style.borderColor='#F9A825';area.style.background='#FFF8E1';area.style.color='#E65100';}
    }
  } catch(err){ if(area){area.innerHTML='⚠️ Ошибка PDF.';area.style.borderColor='#E24B4A';area.style.color='#A32D2D';} }
}

  const c=D.candidates.find(x=>x.id===id); if(!c) return;
  c.added=document.getElementById('fa')?.value||c.added;
  c.name=document.getElementById('fn')?.value.trim()||c.name;

  c.source=document.getElementById('fs')?.value||'';
  c.contacts=document.getElementById('fphone')?.value.trim()||'';
  c.stage=document.getElementById('fst')?.value||c.stage;
  c.status=document.getElementById('fsts')?.value||c.status;
  c.next=document.getElementById('fnx')?.value||'';
  c.nextDate=document.getElementById('fnd')?.value||'';
  c.comment=document.getElementById('fco')?.value||'';
  c.resumeLink=document.getElementById('frl')?.value||'';
  c.meetTime=document.getElementById('fmt')?.value||'';
  c.hhLink=document.getElementById('fhh')?.value||'';
  if(document.getElementById('frr')) c.refuseReason=document.getElementById('frr').value;
  if(!REFUSE_STATUSES.includes(c.status)) c.refuseReason='';
  saveData(); closeModal(); render();
}

function saveEditThenHist(id) {
  const c=D.candidates.find(x=>x.id===id);
  if(c){
    c.contacts=document.getElementById('fphone')?.value.trim()||'';
    c.stage=document.getElementById('fst')?.value||c.stage;
    c.status=document.getElementById('fsts')?.value||c.status;
    if(document.getElementById('frr')) c.refuseReason=document.getElementById('frr').value;
    saveData();
  }
  openHist(id);
}

function openHist(id) {
  const c=D.candidates.find(x=>x.id===id); if(!c) return;
  modal(`<h2>📋 Событие — ${c.name}</h2>
    <div class="fr"><label>Дата</label><input type="date" id="hd" value="${todayStr()}"></div>
    <div class="fr"><label>Тип события</label><select id="he">${sel(EVENTS,'Интервью HR')}</select></div>
    <div class="fr"><label>Описание</label><textarea id="hds"></textarea></div>
    <div class="fr"><label>Результат</label><input id="hr"></div>
    <div class="mfoot">
      <button class="btn" onclick="openEdit('${id}')">← Назад</button>
      <button class="btn btn-primary" onclick="saveHist('${id}')">Добавить</button>
    </div>`);
}

function saveHist(id) {
  const c=D.candidates.find(x=>x.id===id); if(!c) return;
  D.history.push({
    date:document.getElementById('hd')?.value||todayStr(),
    cid:c.id, name:c.name, vacancy:c.vacancy,
    event:document.getElementById('he')?.value||'',
    desc:document.getElementById('hds')?.value||'',
    result:document.getElementById('hr')?.value||'',
    resp:'Я'
  });
  saveData(); closeModal(); render();
}

function importJSON(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try {
      const data=JSON.parse(ev.target.result);
      if(data.candidates&&Array.isArray(data.candidates)) D.candidates=data.candidates.map(c=>({...c,status:normalizeStatus(c.status)}));
      if(data.history&&Array.isArray(data.history)) D.history=data.history;
      saveLocal(); render(); syncToSheets();
      alert('✅ Данные загружены!');
    } catch(err){alert('Ошибка: '+err.message);}
  };
  reader.readAsText(file);
  e.target.value='';
}

loadLocal();
render();
loadFromSheets();
</script>
</body>
</html>
