<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM — Кандидаты</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 font-sans text-sm">

    <div class="max-w-7xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden border border-slate-200">
        <div class="p-4 border-b border-slate-100 bg-slate-50 flex flex-wrap gap-3 items-center justify-between">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                📂 CRM — Кандидаты
            </h2>
            <div class="flex gap-2">
                <input type="text" placeholder="🔍 Поиск..." class="border p-2 rounded w-48 focus:ring-2 focus:ring-blue-400 outline-none">
                <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition font-bold">+ Добавить</button>
            </div>
        </div>

        <div class="p-4 border-b border-slate-100 bg-white flex flex-wrap gap-4">
            <select class="border p-2 rounded text-slate-600 outline-none focus:ring-2 focus:ring-blue-400">
                <option>📅 Дата</option>
            </select>
            <select class="border p-2 rounded text-slate-600 outline-none focus:ring-2 focus:ring-blue-400">
                <option>🚀 Этап</option>
            </select>
            <select class="border p-2 rounded text-slate-600 outline-none focus:ring-2 focus:ring-blue-400">
                <option>📊 Статус</option>
            </select>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800 text-white text-xs uppercase tracking-wider">
                    <tr>
                        <th class="p-3 font-semibold">ID</th>
                        <th class="p-3 font-semibold">ФИО</th>
                        <th class="p-3 font-semibold">Вакансия</th>
                        <th class="p-3 font-semibold">Этап</th>
                        <th class="p-3 font-semibold text-center">Статус</th>
                        <th class="p-3 font-semibold">След. шаг</th>
                        <th class="p-3 text-center">Дата</th>
                        <th class="p-3">Время</th>
                        <th class="p-3">Комментарий</th>
                        <th class="p-3 text-center">Действия</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 text-slate-700" id="tableBody">
                    </tbody>
            </table>
        </div>

        <div class="p-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center text-xs text-slate-400">
            <div>Данные сохраняются локально в браузере.</div>
            <div class="flex gap-4">
                <button onclick="alert('Функция сохранения')" class="flex items-center gap-1 hover:text-slate-600 transition">
                    💾 Сохранить данные
                </button>
                <button onclick="alert('Функция загрузки')" class="flex items-center gap-1 hover:text-slate-600 transition">
                    📂 Загрузить данные
                </button>
            </div>
