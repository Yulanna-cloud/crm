<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM — Кандидаты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-refusal { background-color: #f3f4f6 !important; color: #9ca3af; }
        .status-offer { background-color: #ecfdf5 !important; }
        .status-noshow { background-color: #fff7ed !important; }
        tr:hover { background-color: #f9fafb !important; }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans text-sm">

    <div class="max-w-7xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden border border-slate-200">
        <div class="p-4 border-b border-slate-100 bg-slate-50 flex flex-wrap gap-3 items-center justify-between">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">📂 CRM — Кандидаты</h2>
            <div class="flex gap-2 flex-wrap">
                <input type="text" id="searchInput" placeholder="🔍 Поиск..." class="border p-2 rounded w-40 outline-none focus:ring-2 focus:ring-blue-400">
                <select class="border p-2 rounded text-slate-600 outline-none"><option>📅 Дата</option></select>
                <select class="border p-2 rounded text-slate-600 outline-none"><option>🚀 Этап</option></select>
                <select class="border p-2 rounded text-slate-600 outline-none"><option>📊 Статус</option></select>
                <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition font-bold">+ Добавить</button>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-4 p-4 bg-white border-b border-slate-100">
            <div class="p-3 bg-slate-50 rounded border border-slate-100 text-center">
                <div class="text-2xl font-bold text-slate-700">9</div>
                <div class="text-xs text-slate-500 uppercase tracking-wider">В работе</div>
            </div>
            <div class="p-3 bg-blue-50 rounded border border-blue-100 text-center">
                <div class="text-2xl font-bold text-blue-700">1</div>
                <div class="text-xs text-blue-500 uppercase tracking-wider">Офферы</div>
            </div>
            <div class="p-3 bg-amber-50 rounded border border-amber-100 text-center">
                <div class="text-2xl font-bold text-amber-700">3</div>
                <div class="text-xs text-amber-500 uppercase tracking-wider">Сегодня</div>
            </div>
            <div class="p-3 bg-red-50 rounded border border-red-100 text-center">
                <div class="text-2xl font-bold text-red-700">12</div>
                <div class="text-xs text-red-500 uppercase tracking-wider">Отказы</div>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse" id="mainTable">
                <thead class="bg-slate-800 text-white text-[11px] uppercase tracking-wider">
                    <tr>
                        <th class="p-3 font-semibold">ID</th>
                        <th class="p-3 font-semibold">ФИО</th>
                        <th class="p-3 font-semibold">Вакансия</th>
                        <th class="p-3 font-semibold">Этап</th>
                        <th class="p-3 font-semibold">Статус</th>
                        <th class="p-3 font-semibold text-center">Дата</th>
                        <th class="p-3 font-semibold text-center">Время</th>
                        <th class="p-3 font-semibold">Комментарий</th>
                        <th class="p-3 font-semibold text-center">Действия</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 text-slate-700">
                    </tbody>
            </table>
        </div>

        <div class="p-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center text-xs text-slate-400">
            <div>Данные сохраняются в браузере. Делайте бэкап 💾</div>
            <div class="flex gap-4">
                <button onclick="saveData()" class="flex items-center gap-1 hover:text-slate-700">💾 Сохранить данные</button>
                <button onclick="loadData()" class="flex items-center gap-1 hover:text-slate-700">📂 Загрузить данные</button>
            </div>
        </div>
    </div>

    <script>
        // Здесь будет скрипт, который выведет ваших кандидатов обратно
        // Если данные были в localStorage, они появятся сразу после обновления
    </script>
</body>
</html>
