<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Кандидаты</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:15px;color:#111;background:#eef2f7}
.app{padding:16px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap;background:#fff;padding:12px 16px;border-radius:10px;border:1px solid #e0e0e0}
.topbar h1{font-size:19px;font-weight:700;color:#1F3864}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{font-size:13px;padding:5px 9px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#222;height:32px}
.btn{padding:5px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;color:#222;cursor:pointer;font-size:13px;height:32px}
.btn:hover{background:#f0f0f0}
.btn-primary{background:#1F3864;color:#fff;border-color:#1F3864}
.btn-primary:hover{background:#162a4a}
.btn-sm{padding:3px 8px;font-size:11px;height:24px}
.btn-save{background:#e8f5e9;border-color:#4caf50;color:#2e7d32;font-weight:600}
.btn-load{background:#e3f2fd;border-color:#1976d2;color:#1565c0;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #e0e0e0;cursor:pointer}
.stat:hover{border-color:#1F3864}
.stat-n{font-size:26px;font-weight:700;color:#1F3864}
.stat-l{font-size:12px;color:#555;margin-top:3px;font-weight:600}
.tabs{display:flex;border-bottom:2px solid #e0e0e0;margin-bottom:14px;background:#fff;border-radius:8px 8px 0 0;padding:0 8px}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;border-bottom:3px solid transparent;color:#888;margin-bottom:-2px}
.tab.active{color:#1F3864;border-bottom-color:#1F3864;font-weight:600}
.tbl-wrap{overflow-x:auto;border:1px solid #c8d4e8;border-radius:8px;background:#fff;box-shadow:0 2px 8px rgba(31,56,100,0.08)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:#1F3864;color:#fff;font-weight:700;border-bottom:2px solid #162a4a;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#2a4a7f}
td{padding:9px 12px;border-bottom:1px solid #e8ecf0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#e8f0fc}
.row-overdue td{background:#fff5f5!important}
.row-today td{background:#fffbf0!important}
.row-done td{opacity:0.6}
.row-done td.keep-visible{opacity:1!important}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;white-space:nowrap}
.bw{background:#EAF3DE;color:#3B6D11}
.bo{background:#E6F1FB;color:#185FA5}
.bout{background:#E8F5E9;color:#1B5E20}
.br{background:#FCEBEB;color:#A32D2D}
.brs{background:#FBEAF0;color:#993556}
.bnv{background:#FFF3E0;color:#E65100}
.brop{background:#EDE7F6;color:#4527A0}
.bdef{background:#f0f0f0;color:#666}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.dr{background:#E24B4A}.dy{background:#EF9F27}.dg{background:#639922}
.empty{text-align:center;padding:32px;color:#aaa}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:12px;border:1px solid #ddd;padding:20px;width:560px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px;color:#1F3864}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;color:#888;margin-bottom:4px;font-weight:600;text-transform:uppercase}
.fr input,.fr select,.fr textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff;color:#222}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:#1F3864}
.fr textarea{height:70px;resize:vertical;font-family:Arial,sans-serif}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid #eee}
.hist-item{padding:10px 14px;border-bottom:1px solid #f0f0f0;display:grid;grid-template-columns:90px 150px 1fr 60px;gap:10px;font-size:13px}
.hist-item:last-child{border-bottom:none}
.upload-area{border:2px dashed #ccc;border-radius:8px;padding:14px;text-align:center;color:#888;font-size:13px;cursor:pointer;margin-bottom:12px}
.upload-area:hover{background:#f5f5f5;border-color:#1F3864}
.section-title{font-size:13px;font-weight:600;color:#1F3864;margin:12px 0 8px;padding-bottom:6px;border-bottom:1px solid #eee}
</style>
</head>
<body>
<div class="app">
<div class="topbar">
  <h1>🗂 CRM — Кандидаты</h1>
  <div class="filters">
    <input type="text" id="srch" placeholder="🔍 Поиск..." style="width:140px">
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;padding:0 10px;height:32px;border:1px solid #1976d2;border-radius:6px;background:#e3f2fd;color:#1565c0;font-weight:600;white-space:nowrap">
      <input type="checkbox" id="activeOnly" checked onchange="renderTable()" style="width:14px;height:14px;accent-color:#1565c0"> Только активные
    </label>
    <input type="date" id="fDate" onchange="renderTable()" title="Фильтр по дате встречи" style="height:32px;font-size:13px;border:1px solid #ccc;border-radius:6px;padding:0 8px;background:#fff">
    <button class="btn" onclick="setToday()" title="Показать только сегодня" style="background:#fff8e1;border-color:#f9a825;color:#f57f17;font-weight:600;white-space:nowrap">📅 Сегодня</button>
    <button class="btn" onclick="clearDate()" title="Сбросить дату" style="font-size:12px">✕ Дата</button>
    <select id="fV"><option value="">Все вакансии</option><option>Менеджер по продажам</option><option>РОП</option><option>Project Manager</option></select>
    <div style="position:relative;display:inline-block">
      <button class="btn" onclick="toggleDD('stageDD')" id="stageBtnLabel" style="min-width:120px;text-align:left">Все этапы ▾</button>
      <div id="stageDD" style="display:none;position:absolute;top:34px;left:0;background:#fff;border:1px solid #ccc;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:100;min-width:230px;padding:8px 0">
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Интервью HR" onchange="applyStageFilter()"> Интервью HR</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Интервью с руководителем" onchange="applyStageFilter()"> Интервью с руководителем</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Отклик" onchange="applyStageFilter()"> Отклик</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Финал" onchange="applyStageFilter()"> Финал</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Оффер" onchange="applyStageFilter()"> Оффер</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Обучение" onchange="applyStageFilter()"> Обучение</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Выход" onchange="applyStageFilter()"> Выход</label>
        <div style="border-top:1px solid #eee;margin:4px 0;padding:4px 14px"><button class="btn btn-sm" onclick="clearStageFilter()">Сбросить</button></div>
      </div>
    </div>
    <div style="position:relative;display:inline-block">
      <button class="btn" onclick="toggleDD('statusDD')" id="statusBtnLabel" style="min-width:120px;text-align:left">Все статусы ▾</button>
      <div id="statusDD" style="display:none;position:absolute;top:34px;left:0;background:#fff;border:1px solid #ccc;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:100;min-width:220px;padding:8px 0">
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="В работе" onchange="applyStatusFilter()"> В работе</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Отказался сам" onchange="applyStatusFilter()"> Отказался сам</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Отказалась сама" onchange="applyStatusFilter()"> Отказалась сама</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Отказ" onchange="applyStatusFilter()"> Отказ</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Оффер" onchange="applyStatusFilter()"> Оффер</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Вышел" onchange="applyStatusFilter()"> Вышел</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Не вышла на собес" onchange="applyStatusFilter()"> Не вышла на собес</label>
        <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;font-size:13px"><input type="checkbox" value="Собеседование с РОП" onchange="applyStatusFilter()"> Собеседование с РОП</label>
        <div style="border-top:1px solid #eee;margin:4px 0;padding:4px 14px"><button class="btn btn-sm" onclick="clearStatusFilter()">Сбросить</button></div>
      </div>
    </div>
    <button class="btn btn-save" onclick="exportData()">💾 Сохранить данные</button>
    <label class="btn btn-load" style="cursor:pointer">📂 Загрузить данные<input type="file" accept=".json,.txt" onchange="importData(event)" style="display:none"></label>
    <button class="btn btn-primary" onclick="openAdd()">+ Добавить</button>
  </div>
</div>
<div class="stats" id="stats"></div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('c',this)">Кандидаты</div>
  <div class="tab" onclick="switchTab('h',this)">История событий</div>
</div>
<div id="tc">
  <div class="tbl-wrap">
    <table><thead><tr id="thead-row"></tr></thead><tbody id="tb"></tbody></table>
  </div>
</div>
<div id="th" style="display:none">
  <div class="tbl-wrap"><div id="hb"></div></div>
</div>
</div>
<div id="mdl" style="display:none"></div>

<script>
// ========== КОНСТАНТЫ ==========
const STAGES = ['Отклик', 'Интервью HR', 'Интервью с руководителем', 'Финал', 'Оффер', 'Обучение', 'Выход'];
const STATUSES = ['В работе', 'Отказался сам', 'Отказалась сама', 'Отказ', 'Оффер', 'Вышел', 'Не вышла на собес', 'Собеседование с РОП'];
const VACANCIES = ['Менеджер по продажам', 'РОП', 'Project Manager'];
const EVENTS = ['Добавлен кандидат', 'Интервью HR', 'Интервью с руководителем', 'Тестовое задание', 'Оффер отправлен', 'Оффер принят', 'Отказался сам', 'Отказ компании', 'Выход на работу'];
const REFUSE_REASONS = ['', 'Слабая', 'Не пришла на интервью', 'Не подходит доход', 'Приняла другой оффер', 'Другое'];
const INACTIVE = ['Отказ', 'Отказался сам', 'Отказалась сама', 'Вышел'];

// ========== ДАННЫЕ ==========
let D = { candidates: [], history: [] };

function loadData() {
  const saved = localStorage.getItem('crm_candidates');
  if (saved) {
    D.candidates = JSON.parse(saved);
  } else {
    D.candidates = [];
  }
  
  const savedHist = localStorage.getItem('crm_history');
  if (savedHist) {
    D.history = JSON.parse(savedHist);
  } else {
    D.history = [];
  }
}

function saveData() {
  localStorage.setItem('crm_candidates', JSON.stringify(D.candidates));
  localStorage.setItem('crm_history', JSON.stringify(D.history));
}

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function parseDate(s) {
  if (!s) return null;
  const p = s.split('-');
  if (p.length !== 3) return null;
  return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
}

function isSameDay(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return false;
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

function showSaved() {
  let el = document.getElementById('savedMsg');
  if (!el) {
    el = document.createElement('div');
    el.id = 'savedMsg';
    el.style.cssText = 'position:fixed;bottom:16px;right:16px;background:#2e7d32;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity 0.3s';
    el.textContent = '✅ Сохранено';
    document.body.appendChild(el);
  }
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 2000);
}

function exportData() {
  const data = JSON.stringify({ candidates: D.candidates, history: D.history }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'crm_data_' + todayStr() + '.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.candidates) {
        D.candidates = data.candidates;
      }
      if (data.history) {
        D.history = data.history;
      }
      saveData();
      render();
      alert('✅ Данные загружены!');
    } catch (err) {
      alert('Ошибка: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function nextId() {
  if (!D.candidates.length) return 'K-001';
  const nums = D.candidates.map(c => parseInt(c.id.replace(/\D/g, '')) || 0);
  return 'K-' + String(Math.max(...nums) + 1).padStart(3, '0');
}

function sel(opts, val) {
  return opts.map(o => `<option${o === val ? ' selected' : ''}>${o}</option>`).join('');
}

function toggleRefuse(s, divId) {
  const d = document.getElementById(divId);
  if (d) {
    d.style.display = ['Отказ', 'Отказался сам', 'Отказалась сама'].includes(s.value) ? 'block' : 'none';
  }
}

function sbadge(s) {
  const m = {
    'В работе': 'bw', 'Оффер': 'bo', 'Вышел': 'bout', 'Отказ': 'br',
    'Отказался сам': 'brs', 'Отказалась сама': 'brs', 'Не вышла на собес': 'bnv', 'Собеседование с РОП': 'brop'
  };
  return `<span class="badge ${m[s] || 'bdef'}">${s}</span>`;
}

function dlabel(ds) {
  const d = parseDate(ds);
  if (!d) return '';
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  d.setHours(0, 0, 0, 0);
  const diff = Math.round((d - today) / 86400000);
  const cls = diff < 0 ? 'dr' : diff === 0 ? 'dy' : 'dg';
  return `<span class="dot ${cls}"></span>${d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' })}`;
}

function rclass(c) {
  if (INACTIVE.includes(c.status)) return 'row-done';
  if (!c.nextDate) return '';
  const d = parseDate(c.nextDate);
  if (!d) return '';
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  d.setHours(0, 0, 0, 0);
  const diff = Math.round((d - today) / 86400000);
  return diff < 0 ? 'row-overdue' : diff === 0 ? 'row-today' : '';
}

// ========== ФИЛЬТРЫ И СОРТИРОВКА ==========
let sortCol = 'id';
let sortDir = 1;

function sortBy(col) {
  sortCol === col ? sortDir *= -1 : (sortCol = col, sortDir = 1);
  renderTable();
}

function arrow(col) {
  return sortCol === col ? (sortDir === 1 ? ' ↑' : ' ↓') : '';
}

function getChecked(ddId) {
  return [...document.querySelectorAll(`#${ddId} input[type=checkbox]:checked`)].map(x => x.value);
}

function applyStageFilter() {
  const checked = getChecked('stageDD');
  document.getElementById('stageBtnLabel').textContent = checked.length ? checked.join(', ') + ' ▾' : 'Все этапы ▾';
  renderTable();
}

function applyStatusFilter() {
  const checked = getChecked('statusDD');
  document.getElementById('statusBtnLabel').textContent = checked.length ? checked.join(', ') + ' ▾' : 'Все статусы ▾';
  renderTable();
}

function clearStageFilter() {
  document.querySelectorAll('#stageDD input').forEach(x => x.checked = false);
  document.getElementById('stageBtnLabel').textContent = 'Все этапы ▾';
  document.getElementById('stageDD').style.display = 'none';
  renderTable();
}

function clearStatusFilter() {
  document.querySelectorAll('#statusDD input').forEach(x => x.checked = false);
  document.getElementById('statusBtnLabel').textContent = 'Все статусы ▾';
  document.getElementById('statusDD').style.display = 'none';
  renderTable();
}

function toggleDD(id) {
  const dd = document.getElementById(id);
  ['stageDD', 'statusDD'].filter(x => x !== id).forEach(x => document.getElementById(x).style.display = 'none');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#stageDD') && !e.target.closest('[onclick*="stageDD"]')) document.getElementById('stageDD').style.display = 'none';
  if (!e.target.closest('#statusDD') && !e.target.closest('[onclick*="statusDD"]')) document.getElementById('statusDD').style.display = 'none';
});

function setToday() {
  document.getElementById('fDate').value = todayStr();
  renderTable();
}

function clearDate() {
  document.getElementById('fDate').value = '';
  renderTable();
}

function filterToday() {
  setToday();
}

function renderStats() {
  const active = D.candidates.filter(x => x.status === 'В работе').length;
  const offers = D.candidates.filter(x => x.status === 'В работе' && x.stage === 'Оффер').length;
  const tod = D.candidates.filter(x => !INACTIVE.includes(x.status) && isSameDay(x.nextDate)).length;
  const ref = D.candidates.filter(x => ['Отказ', 'Отказался сам', 'Отказалась сама'].includes(x.status)).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-n">${active}</div><div class="stat-l">В работе</div></div>
    <div class="stat"><div class="stat-n">${offers}</div><div class="stat-l">На стадии оффера</div></div>
    <div class="stat" onclick="filterToday()" title="Нажмите чтобы показать встречи сегодня"><div class="stat-n">${tod}</div><div class="stat-l">Встреч сегодня 👆</div></div>
    <div class="stat"><div class="stat-n">${ref}</div><div class="stat-l">Отказов</div></div>`;
}

function renderHeaders() {
  const cols = [
    { key: 'id', label: 'ID' }, { key: 'name', label: 'ФИО' }, { key: 'vacancy', label: 'Вакансия' },
    { key: 'stage', label: 'Этап' }, { key: 'status', label: 'Статус' },
    { key: '', label: 'Следующий шаг' }, { key: 'date', label: 'Дата' }, { key: '', label: 'Время' },
    { key: '', label: 'Телефон' }, { key: '', label: 'Email' },
    { key: '', label: 'Причина отказа' }, { key: '', label: 'Комментарий' },
    { key: '', label: 'Резюме' }, { key: '', label: 'PDF/HH' }, { key: '', label: '' }
  ];
  document.getElementById('thead-row').innerHTML = cols.map(c =>
    `<th${c.key ? ` onclick="sortBy('${c.key}')"` : ''} style="padding:10px 12px;background:#1F3864;color:#fff;font-weight:700;border-bottom:2px solid #162a4a;white-space:nowrap${c.key ? ';cursor:pointer' : ''}">
      ${c.label}${c.key ? arrow(c.key) : ''}
    </th>`
  ).join('');
}

function renderTable() {
  renderHeaders();
  const q = document.getElementById('srch').value.toLowerCase();
  const fv = document.getElementById('fV').value;
  const stages = getChecked('stageDD');
  const statuses = getChecked('statusDD');
  const activeOnly = document.getElementById('activeOnly').checked;
  const fDate = document.getElementById('fDate').value;

  let rows = D.candidates.filter(c => {
    if (q && !c.name.toLowerCase().includes(q)) return false;
    if (fv && c.vacancy !== fv) return false;
    if (stages.length && !stages.includes(c.stage)) return false;
    if (statuses.length && !statuses.includes(c.status)) return false;
    if (activeOnly && !statuses.length && INACTIVE.includes(c.status)) return false;
    if (fDate && c.nextDate !== fDate) return false;
    return true;
  });

  rows.sort((a, b) => {
    if (sortCol === 'id') return sortDir * (parseInt(a.id.replace(/\D/g, '')) - parseInt(b.id.replace(/\D/g, '')));
    if (sortCol === 'date') {
      const ad = a.nextDate || '9999', bd = b.nextDate || '9999';
      if (ad !== bd) return sortDir * ad.localeCompare(bd);
      return sortDir * (a.meetTime || '').localeCompare(b.meetTime || '');
    }
    const av = (sortCol === 'name' ? a.name : sortCol === 'stage' ? a.stage : sortCol === 'status' ? a.status : sortCol === 'vacancy' ? a.vacancy : '') || '';
    const bv = (sortCol === 'name' ? b.name : sortCol === 'stage' ? b.stage : sortCol === 'status' ? b.status : sortCol === 'vacancy' ? b.vacancy : '') || '';
    return sortDir * av.localeCompare(bv, 'ru');
  });

  const tb = document.getElementById('tb');
  if (!rows.length) {
    tb.innerHTML = `<tr><td colspan="15" class="empty">Нет кандидатов</td></tr>`;
    return;
  }

  tb.innerHTML = rows.map(c => {
    const lnk = c.resumeLink;
    const resume = lnk ? `<a href="${lnk}" target="_blank" style="color:#185FA5;font-size:12px">Открыть</a>` : '—';
    const hhOrPdf = c.hhLink ? `<a href="${c.hhLink}" target="_blank" style="color:#d6001c;font-size:12px">HH ↗</a>` :
      c.pdfName ? `<span style="font-size:11px;color:#555" title="${c.pdfName}">📄 ${c.pdfName.length > 15 ? c.pdfName.slice(0, 13) + '…' : c.pdfName}</span>` : '—';
    const isRefused = INACTIVE.includes(c.status);
    const refReason = isRefused && c.refuseReason ? `<span style="background:#FCEBEB;color:#A32D2D;padding:2px 7px;border-radius:8px;font-size:11px;font-weight:700">${c.refuseReason}</span>` : '';
    const commentStyle = isRefused ? 'color:#A32D2D;font-weight:600' : 'color:#555';
    
    // Разделяем телефон и email
    let phone = '', email = '';
    if (c.contacts) {
      const parts = c.contacts.split(' / ');
      // Определяем что телефон, а что email
      for (let part of parts) {
        if (part.includes('@')) {
          email = part;
        } else if (part.match(/[\d\+]/)) {
          phone = part;
        }
      }
    }
    
    return `<tr class="${rclass(c)}">
      <td style="color:#999;font-size:12px">${c.id}</td>
      <td style="font-weight:700;white-space:nowrap">${c.name}</td>
      <td style="font-size:12px">${c.vacancy}</td>
      <td style="font-size:12px">${c.stage}</td>
      <td>${sbadge(c.status)}</td>
      <td style="max-width:160px;font-size:12px">${c.next || '—'}</td>
      <td style="white-space:nowrap;font-size:12px">${dlabel(c.nextDate)}</td>
      <td style="font-size:13px;font-weight:700;color:#1F3864;white-space:nowrap">${c.meetTime || ''}</td>
      <td style="font-size:12px;white-space:nowrap">${phone || '—'}</td>
      <td style="font-size:12px">${email || '—'}</td>
      <td class="keep-visible">${refReason}</td>
      <td class="keep-visible" style="max-width:150px;font-size:12px;${commentStyle}">${c.comment || ''}</td>
      <td>${resume}</td>
      <td>${hhOrPdf}</td>
      <td><button class="btn btn-sm" onclick="openEdit('${c.id}')">✏️</button></td>
    </tr>`;
  }).join('');
}

function renderHistory() {
  const hb = document.getElementById('hb');
  const items = [...D.history].reverse();
  if (!items.length) {
    hb.innerHTML = `<div class="empty">История пуста</div>`;
    return;
  }
  hb.innerHTML = items.map(h => `<div class="hist-item">
    <div style="color:#999">${h.date ? new Date(h.date + 'T12:00:00').toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: '2-digit' }) : ''}</div>
    <div><div style="font-weight:600">${h.name || ''}</div><div style="color:#aaa;font-size:11px">${h.cid || ''}</div></div>
    <div><div style="color:#888;font-size:11px;font-weight:600">${h.event || ''}</div><div style="margin-top:2px">${h.desc || ''}</div>${h.result ? `<div style="color:#aaa;font-size:11px">${h.result}</div>` : ''}</div>
    <div style="color:#aaa;font-size:11px">${h.resp || ''}</div>
  </div>`).join('');
}

function render() {
  renderStats();
  renderTable();
  renderHistory();
}
