<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM — Кандидаты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-refusal { background-color: #f3f4f6 !important; color: #9ca3af; }
        .status-offer { background-color: #ecfdf5 !important; }
        .status-noshow { background-color: #fff7ed !important; }
        tr:hover { background-color: #f9fafb !important; }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans text-sm">

    <div class="max-w-7xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden border border-slate-200">
        <div class="p-4 border-b border-slate-100 bg-slate-50 flex flex-wrap gap-3 items-center justify-between">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">📂 CRM — Кандидаты</h2>
            <div class="flex gap-2 flex-wrap">
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="🔍 Поиск..." class="border p-2 rounded w-40 outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="alert('Функция добавления будет в следующем обновлении!')" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition font-bold">+ Добавить</button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse" id="mainTable">
                <thead class="bg-slate-800 text-white text-[11px] uppercase tracking-wider">
                    <tr>
                        <th class="p-3">ID</th>
                        <th class="p-3">ФИО</th>
                        <th class="p-3">Вакансия</th>
                        <th class="p-3 text-center">Статус</th>
                        <th class="p-3 text-center">Дата</th>
                        <th class="p-3">Время</th>
                        <th class="p-3">Комментарий</th>
                        <th class="p-3 text-center">Действия</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-100 text-slate-700">
                    </tbody>
            </table>
        </div>

        <div class="p-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center text-xs text-slate-400">
            <div>Нажмите «Загрузить», чтобы вернуть ваших кандидатов 📂</div>
            <div class="flex gap-4">
                <button onclick="exportData()" class="flex items-center gap-1 hover:text-slate-700">💾 Сохранить файл</button>
                <label class="cursor-pointer flex items-center gap-1 hover:text-slate-700">
                    📂 Загрузить файл
                    <input type="file" id="fileInput" class="hidden" accept=".json" onchange="importData(event)">
                </label>
            </div>
        </div>
    </div>

    <script>
        // Функция для загрузки данных из файла
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    renderTable(data);
                    alert('Данные успешно загружены!');
                } catch (err) {
                    alert('Ошибка: выберите корректный файл данных CRM');
                }
            };
            reader.readAsText(file);
        }

        // Функция отрисовки таблицы
        function renderTable(candidates) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            candidates.forEach(c => {
                let statusClass = '';
                if (c.status === 'Отказ') statusClass = 'status-refusal';
                if (c.status === 'Оффер') statusClass = 'status-offer';
                if (c.status === 'Не вышла') statusClass = 'status-noshow';

                const row = `
                    <tr class="${statusClass} transition-colors">
                        <td class="p-3 text-slate-400">${c.id || ''}</td>
                        <td class="p-3 font-medium">${c.name || ''}</td>
                        <td class="p-3 text-slate-500">${c.vacancy || ''}</td>
                        <td class="p-3 text-center">
                            <span class="px-2 py-1 rounded bg-white/50 text-[10px] font-bold uppercase border">${c.status || ''}</span>
                        </td>
                        <td class="p-3 text-center">${c.date || ''}</td>
                        <td class="p-3">${c.time || ''}</td>
                        <td class="p-3 text-xs text-slate-500">${c.comment || ''}</td>
                        <td class="p-3 text-center">✏️</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // Простой поиск по таблице
        function filterTable() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(input) ? '' : 'none';
            });
        }
    </script>
</body>
</html>
