<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM — Кандидаты (Smart Time)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-refusal { background-color: #f3f4f6; color: #9ca3af; }
        .status-offer { background-color: #ecfdf5; }
        .status-noshow { background-color: #fff7ed; }
        
        /* Анимация мигания для прошедшего времени */
        @keyframes pulse-red {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        .time-urgent { color: #ef4444; font-weight: bold; font-size: 1.1em; }
        .time-passed { color: #ef4444; font-weight: bold; animation: pulse-red 2s infinite; display: inline-block; }
        
        tr:hover { background-color: #f9fafb !important; }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans text-sm">

    <div class="max-w-7xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden border border-slate-200">
        <div class="p-4 border-b border-slate-100 bg-slate-50 flex flex-wrap gap-3 items-center justify-between">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">📂 CRM — Кандидаты</h2>
            <div class="flex gap-2">
                <input type="text" placeholder="🔍 Поиск..." class="border p-2 rounded w-48 focus:ring-2 focus:ring-blue-400 outline-none">
                <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition">+ Добавить</button>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse" id="candidateTable">
                <thead class="bg-slate-800 text-white text-xs uppercase">
                    <tr>
                        <th class="p-3">ID</th>
                        <th class="p-3">ФИО</th>
                        <th class="p-3">Статус</th>
                        <th class="p-3 text-center">Дата</th>
                        <th class="p-3">Время</th>
                        <th class="p-3">Комментарий</th>
                        <th class="p-3 text-center">Действия</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <tr class="transition-colors">
                        <td class="p-3 text-slate-400">K-014</td>
                        <td class="p-3 font-medium">Фролова Татьяна</td>
                        <td class="p-3"><span class="px-2 py-1 rounded bg-green-100 text-green-700 text-xs font-bold uppercase">В работе</span></td>
                        <td class="p-3 text-center font-bold text-red-500">14.04</td>
                        <td class="p-3" data-time="12:00">12:00</td>
                        <td class="p-3 text-xs text-slate-500">Время подтвердила. Встреча с РОП.</td>
                        <td class="p-3 text-center">✏️</td>
                    </tr>
                    <tr class="status-offer transition-colors">
                        <td class="p-3 text-slate-400">K-017</td>
                        <td class="p-3 font-medium">Курбанова Наталья</td>
                        <td class="p-3"><span class="px-2 py-1 rounded bg-blue-100 text-blue-700 text-xs font-bold uppercase">Оффер</span></td>
                        <td class="p-3 text-center text-amber-500">15.04</td>
                        <td class="p-3" data-time="14:00">14:00</td>
                        <td class="p-3 text-xs text-slate-500">Хочет срочно выйти.</td>
                        <td class="p-3 text-center">✏️</td>
                    </tr>
                    <tr class="status-refusal transition-colors">
                        <td class="p-3 opacity-50">K-009</td>
                        <td class="p-3 opacity-50">Иванова Мария</td>
                        <td class="p-3"><span class="px-2 py-1 rounded bg-slate-200 text-slate-500 text-xs font-bold uppercase">Отказ</span></td>
                        <td class="p-3 text-center opacity-50">12.04</td>
                        <td class="p-3 opacity-50" data-time="10:00">10:00</td>
                        <td class="p-3 text-xs opacity-50">Не подошла по опыту.</td>
                        <td class="p-3 text-center">✏️</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function updateClocks() {
            const now = new Date();
            const currentTimeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const [nowH, nowM] = [now.getHours(), now.getMinutes()];

            document.querySelectorAll('[data-time]').forEach(el => {
                const timeValue = el.getAttribute('data-time');
                const [targetH, targetM] = timeValue.split(':').map(Number);
                
                const diffMinutes = (targetH * 60 + targetM) - (nowH * 60 + nowM);

                // Если время прошло (мигает)
                if (diffMinutes <= 0) {
                    el.className = "p-3 time-passed";
                } 
                // Если осталось меньше 30 минут (красный жирный)
                else if (diffMinutes <= 30) {
                    el.className = "p-3 time-urgent";
                }
            });
        }

        // Обновлять каждую минуту
        setInterval(updateClocks, 60000);
        updateClocks();
    </script>
</body>
</html>
