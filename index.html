<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><title>CRM — Кандидаты</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:14px;background:#eef2f7;padding:16px}
.topbar{display:flex;justify-content:space-between;background:#fff;padding:12px;border-radius:10px;border:1px solid #ddd;margin-bottom:15px}
.filters{display:flex;gap:8px;align-items:center}
.btn{padding:6px 12px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:#fff}
.btn-p{background:#1F3864;color:#fff;border:none;font-weight:700}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:15px}
.stat{background:#fff;padding:12px;border-radius:8px;border:1px solid #ddd;text-align:center}
.stat-n{font-size:22px;font-weight:700;color:#1F3864}
.tbl-wrap{background:#fff;border-radius:8px;border:1px solid #ddd;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px;background:#1F3864;color:#fff}
td{padding:8px 10px;border-bottom:1px solid #eee}
.row-offer td{background:#ecfdf5!important}
.row-refusal td{background:#f3f4f6!important;color:#999}
.row-noshow td{background:#fff7ed!important}
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:#eee}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center}
.modal{background:#fff;padding:20px;border-radius:10px;width:450px}
.fr{margin-bottom:10px}
.fr label{display:block;font-size:11px;color:#888;margin-bottom:3px}
.fr input,.fr select,.fr textarea{width:100%;padding:6px;border:1px solid #ddd;border-radius:4px}
</style>
</head>
<body>
<div class="topbar">
  <h3>🗂 CRM — Кандидаты</h3>
  <div class="filters">
    <input type="text" id="srch" placeholder="Поиск..." oninput="render()">
    <button class="btn" onclick="exportD()">💾 Сохранить</button>
    <label class="btn">📂 Загрузить<input type="file" id="fIn" style="display:none" onchange="importD(event)"></label>
    <button class="btn btn-p" onclick="openAdd()">+ Добавить</button>
  </div>
</div>
<div id="sts" class="stats"></div>
<div class="tbl-wrap">
  <table><thead><tr><th>ID</th><th>ФИО</th><th>Этап</th><th>Статус</th><th>Дата</th><th>Время</th><th>Комментарий</th><th></th></tr></thead><tbody id="tb"></tbody></table>
</div>
<div id="mdl" class="modal-bg"></div>
<script>
let D={candidates:[]};
const ST=["Отклик","Интервью HR","Интервью РОП","Оффер","Обучение","Выход"];
const SS=["В работе","Отказ","Оффер","Не вышла"];
function load(){let c=localStorage.getItem('crm_c');if(c)D.candidates=JSON.parse(c);render();}
function save(){localStorage.setItem('crm_c',JSON.stringify(D.candidates));render();}
function render(){
  let q=document.getElementById('srch').value.toLowerCase();
  let c=D.candidates;
  document.getElementById('sts').innerHTML=`<div class="stat"><div class="stat-n">${c.filter(x=>x.s==='В работе').length}</div>В работе</div><div class="stat"><div class="stat-n">${c.filter(x=>x.s==='Оффер').length}</div>Офферы</div><div class="stat"><div class="stat-n">${c.filter(x=>x.s==='Не вышла').length}</div>Не вышли</div><div class="stat"><div class="stat-n" style="color:red">${c.filter(x=>x.s==='Отказ').length}</div>Отказы</div>`;
  document.getElementById('tb').innerHTML=c.filter(x=>!q||x.n.toLowerCase().includes(q)).map(x=>`<tr class="${x.s==='Оффер'?'row-offer':(x.s==='Отказ'?'row-refusal':(x.s==='Не вышла'?'row-noshow':''))}"><td>${x.id}</td><td><b>${x.n}</b></td><td>${x.e||''}</td><td><span class="badge">${x.s}</span></td><td>${x.d||''}</td><td>${x.t||''}</td><td>${x.c||''}</td><td><button onclick="openEdit('${x.id}')">✏️</button></td></tr>`).join('');
}
function openAdd(){showM('Добавить',{id:'K-'+Date.now().toString().slice(-3),n:'',s:'В работе',e:'Отклик'});}
function openEdit(id){showM('Редактировать',D.candidates.find(x=>x.id===id));}
function showM(t,o){
  let m=document.getElementById('mdl');m.style.display='flex';
  m.innerHTML=`<div class="modal"><h2>${t} ${o.id}</h2><div class="fr"><label>ФИО</label><input id="mn" value="${o.n}"></div><div class="fr"><label>Статус</label><select id="ms">${SS.map(s=>`<option ${o.s===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="fr"><label>Этап</label><select id="me">${ST.map(s=>`<option ${o.e===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="fr"><label>Дата</label><input type="date" id="md" value="${o.d||''}"></div><div class="fr"><label>Время</label><input type="time" id="mt" value="${o.t||''}"></div><div class="fr"><label>Комментарий</label><textarea id="mc">${o.c||''}</textarea></div><button class="btn" onclick="document.getElementById('mdl').style.display='none'">Отмена</button><button class="btn btn-p" onclick="saveC('${o.id}')">Сохранить</button></div>`;
}
function saveC(id){
  let idx=D.candidates.findIndex(x=>x.id===id);
  let obj={id,n:document.getElementById('mn').value,s:document.getElementById('ms').value,e:document.getElementById('me').value,d:document.getElementById('md').value,t:document.getElementById('mt').value,c:document.getElementById('mc').value};
  if(idx>-1)D.candidates[idx]=obj;else D.candidates.push(obj);
  document.getElementById('mdl').style.display='none';save();
}
function exportD(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(D)],{type:'application/json'}));a.download='crm.json';a.click();}
function importD(e){let r=new FileReader();r.onload=function(ev){D=JSON.parse(ev.target.result);save();alert('Загружено!');};r.readAsText(e.target.files[0]);}
load();
</script>
</body>
</html>
